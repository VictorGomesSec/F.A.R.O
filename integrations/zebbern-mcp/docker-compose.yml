services:
  kali-server:
    container_name: zebbern-kali
    image: ghcr.io/zebbern/zebbern-kali-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-5000}:${API_PORT:-5000}"
      - "1080:1080"
    environment:
      - API_PORT=${API_PORT:-5000}
      - DEBUG_MODE=${DEBUG_MODE:-0}
      - BLOCKING_TIMEOUT=${BLOCKING_TIMEOUT:-30}
      - HTB_ROUTES=${HTB_ROUTES:-}
      - EXTRA_HOSTS=${EXTRA_HOSTS:-}
    cap_add:
      - NET_RAW
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - kali-tmp:/app/tmp
      - ${VPN_DIR:-./vpn}:/vpn:ro

volumes:
  kali-tmp:
